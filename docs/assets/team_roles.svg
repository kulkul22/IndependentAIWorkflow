<svg viewBox="0 0 1200 1000" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="1000" fill="#1e1e2e"/>

  <text x="600" y="40" text-anchor="middle" font-size="30" font-weight="700" fill="#89b4fa">Team Roles &amp; Personas</text>
  <text x="600" y="65" text-anchor="middle" font-size="14" fill="#cdd6f4" opacity="0.75">Worker AI executes the lifecycle locally · Advisor AI is consulted on schedule or escalation</text>

  <!-- Column headers -->
  <rect x="180" y="90" width="340" height="55" rx="14" fill="#89b4fa" filter="url(#softShadow)"/>
  <text x="350" y="115" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1e2e">WORKER AI (Antigravity &amp; Javis OS)</text>
  <text x="350" y="135" text-anchor="middle" font-size="12" fill="#1e1e2e" opacity="0.8">Local · Cost-Free · Core Execution</text>

  <rect x="680" y="90" width="340" height="55" rx="14" fill="#f38ba8" filter="url(#softShadow)"/>
  <text x="850" y="115" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1e2e">ADVISOR AI (Claude CLI)</text>
  <text x="850" y="135" text-anchor="middle" font-size="12" fill="#1e1e2e" opacity="0.8">Expert · Pay-per-call · On Demand</text>

  <!-- ================= WORKER COLUMN ================= -->
  <!-- Phase 0: Brain Sync -->
  <g>
    <rect x="180" y="170" width="340" height="95" rx="16" fill="#313244" stroke="#a6e3a1" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="225" cy="217" r="22" fill="#a6e3a1"/>
    <text x="225" y="224" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">0</text>
    <text x="265" y="209" font-size="18" font-weight="700" fill="#cdd6f4">Brain Sync</text>
    <text x="265" y="232" font-size="13.5" fill="#a6e3a1" font-weight="600">Persona: Javis Daemon</text>
    <text x="265" y="250" font-size="12.5" fill="#cdd6f4" opacity="0.8">Injects context from Second Brain</text>
  </g>

  <!-- Phase 1: Research -->
  <g>
    <rect x="180" y="285" width="340" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="225" cy="332" r="22" fill="#89b4fa"/>
    <text x="225" y="339" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">1</text>
    <text x="265" y="324" font-size="18" font-weight="700" fill="#cdd6f4">Research</text>
    <text x="265" y="347" font-size="13.5" fill="#89b4fa" font-weight="600">Persona: Senior Systems Analyst</text>
    <text x="265" y="365" font-size="12.5" fill="#cdd6f4" opacity="0.8">Gathers context and dependencies</text>
  </g>

  <!-- Phase 2: Plan -->
  <g>
    <rect x="180" y="400" width="340" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="225" cy="447" r="22" fill="#89b4fa"/>
    <text x="225" y="454" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">2</text>
    <text x="265" y="439" font-size="18" font-weight="700" fill="#cdd6f4">Analyze &amp; Plan</text>
    <text x="265" y="462" font-size="13.5" fill="#89b4fa" font-weight="600">Persona: Lead Software Architect</text>
    <text x="265" y="480" font-size="12.5" fill="#cdd6f4" opacity="0.8">master_plan.md &amp; file tree</text>
  </g>

  <!-- Phase 3: Tasks -->
  <g>
    <rect x="180" y="515" width="340" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="225" cy="562" r="22" fill="#89b4fa"/>
    <text x="225" y="569" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">3</text>
    <text x="265" y="554" font-size="18" font-weight="700" fill="#cdd6f4">Break Down Tasks</text>
    <text x="265" y="577" font-size="13.5" fill="#89b4fa" font-weight="600">Persona: Agile Scrum Master</text>
    <text x="265" y="595" font-size="12.5" fill="#cdd6f4" opacity="0.8">Creates task.md execution steps</text>
  </g>

  <!-- Phase 4/5: Code & Validate -->
  <g>
    <rect x="180" y="630" width="340" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="225" cy="677" r="22" fill="#89b4fa"/>
    <text x="225" y="683" text-anchor="middle" font-size="15" font-weight="700" fill="#1e1e2e">4/5</text>
    <text x="265" y="669" font-size="18" font-weight="700" fill="#cdd6f4">Code &amp; Validate</text>
    <text x="265" y="692" font-size="13.5" fill="#89b4fa" font-weight="600">Persona: Staff Eng. / SDET</text>
    <text x="265" y="710" font-size="12.5" fill="#cdd6f4" opacity="0.8">Implements source and runs tests</text>
  </g>

  <!-- Phase 7: Report -->
  <g>
    <rect x="180" y="745" width="340" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="225" cy="792" r="22" fill="#89b4fa"/>
    <text x="225" y="799" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">7</text>
    <text x="265" y="784" font-size="18" font-weight="700" fill="#cdd6f4">Report</text>
    <text x="265" y="807" font-size="13.5" fill="#89b4fa" font-weight="600">Persona: Technical Writer</text>
    <text x="265" y="825" font-size="12.5" fill="#cdd6f4" opacity="0.8">Summarizes walkthrough results</text>
  </g>

  <!-- Phase 7.5: Knowledge Archive -->
  <g>
    <rect x="180" y="860" width="340" height="95" rx="16" fill="#313244" stroke="#a6e3a1" stroke-width="2" stroke-dasharray="8,5" filter="url(#softShadow)"/>
    <circle cx="225" cy="907" r="22" fill="#a6e3a1"/>
    <text x="225" y="913" text-anchor="middle" font-size="15" font-weight="700" fill="#1e1e2e">7.5</text>
    <text x="265" y="899" font-size="18" font-weight="700" fill="#cdd6f4">Knowledge Archive</text>
    <text x="265" y="922" font-size="13.5" fill="#a6e3a1" font-weight="600">Persona: Librarian</text>
    <text x="265" y="940" font-size="12.5" fill="#cdd6f4" opacity="0.8">Indexes lessons into ChromaDB</text>
  </g>

  <!-- Vertical flow arrows: worker column -->
  <line x1="350" y1="265" x2="350" y2="285" stroke="#a6e3a1" stroke-width="2.5" stroke-dasharray="5,3"/>
  <line x1="350" y1="380" x2="350" y2="400" stroke="#89b4fa" stroke-width="2.5"/>
  <line x1="350" y1="495" x2="350" y2="515" stroke="#89b4fa" stroke-width="2.5"/>
  <line x1="350" y1="610" x2="350" y2="630" stroke="#89b4fa" stroke-width="2.5"/>
  <line x1="350" y1="725" x2="350" y2="745" stroke="#89b4fa" stroke-width="2.5"/>
  <line x1="350" y1="840" x2="350" y2="860" stroke="#a6e3a1" stroke-width="2.5" stroke-dasharray="5,3"/>

  <!-- ================= ADVISOR COLUMN ================= -->
  <!-- Phase 2.5: Plan Review -->
  <g>
    <rect x="680" y="400" width="340" height="95" rx="16" fill="#313244" stroke="#f38ba8" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="725" cy="447" r="22" fill="#f38ba8"/>
    <text x="725" y="454" text-anchor="middle" font-size="15" font-weight="700" fill="#1e1e2e">2.5</text>
    <text x="765" y="439" font-size="18" font-weight="700" fill="#cdd6f4">Plan Review</text>
    <text x="765" y="462" font-size="13.5" fill="#f38ba8" font-weight="600">Persona: Principal Architect</text>
    <text x="765" y="480" font-size="12.5" fill="#cdd6f4" opacity="0.8">Audits master_plan.md (Mode 4)</text>
  </g>

  <!-- Debug Escalate -->
  <g>
    <rect x="680" y="515" width="340" height="95" rx="16" fill="#313244" stroke="#f38ba8" stroke-width="2" stroke-dasharray="8,5" filter="url(#softShadow)"/>
    <circle cx="725" cy="562" r="22" fill="#f38ba8"/>
    <text x="725" y="569" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">⚡</text>
    <text x="765" y="554" font-size="18" font-weight="700" fill="#cdd6f4">Debug Escalate</text>
    <text x="765" y="577" font-size="13.5" fill="#f38ba8" font-weight="600">Persona: Expert Troubleshooter</text>
    <text x="765" y="595" font-size="12.5" fill="#cdd6f4" opacity="0.8">Called if tests fail &gt; 2 times</text>
  </g>

  <!-- Phase 6: Code Audit -->
  <g>
    <rect x="680" y="630" width="340" height="95" rx="16" fill="#313244" stroke="#f38ba8" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="725" cy="677" r="22" fill="#f38ba8"/>
    <text x="725" y="684" text-anchor="middle" font-size="18" font-weight="700" fill="#1e1e2e">6</text>
    <text x="765" y="669" font-size="18" font-weight="700" fill="#cdd6f4">Code Audit</text>
    <text x="765" y="692" font-size="13.5" fill="#f38ba8" font-weight="600">Persona: Security Auditor</text>
    <text x="765" y="710" font-size="12.5" fill="#cdd6f4" opacity="0.8">Checks diffs &amp; test results</text>
  </g>

  <!-- Connecting Lines between columns -->
  <line x1="520" y1="447" x2="680" y2="447" stroke="#89b4fa" stroke-width="2.5" stroke-dasharray="5,5"/>
  <line x1="680" y1="562" x2="520" y2="562" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="5,5"/>
  <line x1="680" y1="677" x2="520" y2="677" stroke="#89b4fa" stroke-width="2.5" stroke-dasharray="5,5"/>

</svg>
