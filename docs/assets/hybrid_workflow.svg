<svg viewBox="0 0 1200 880" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#89b4fa"/>
    </marker>
    <marker id="arrowRed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#f38ba8"/>
    </marker>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect x="0" y="0" width="1200" height="880" fill="#1e1e2e"/>

  <text x="600" y="40" text-anchor="middle" font-size="30" font-weight="700" fill="#89b4fa">Hybrid AI Workflow</text>
  <text x="600" y="63" text-anchor="middle" font-size="14" fill="#cdd6f4" opacity="0.75">Worker AI executes the lifecycle locally · Advisor AI is consulted on schedule or escalation</text>

  <!-- Column headers -->
  <rect x="60" y="88" width="280" height="55" rx="14" fill="#89b4fa" filter="url(#softShadow)"/>
  <text x="200" y="112" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1e2e">WORKER AI</text>
  <text x="200" y="132" text-anchor="middle" font-size="12" fill="#1e1e2e" opacity="0.8">Local · Cost-Free · Phases 1-5</text>

  <rect x="860" y="88" width="280" height="55" rx="14" fill="#89b4fa" filter="url(#softShadow)"/>
  <text x="1000" y="112" text-anchor="middle" font-size="19" font-weight="700" fill="#1e1e2e">ADVISOR AI</text>
  <text x="1000" y="132" text-anchor="middle" font-size="12" fill="#1e1e2e" opacity="0.8">Expert · Pay-per-call · On Demand</text>

  <!-- ================= WORKER COLUMN ================= -->
  <!-- Phase 1: Research -->
  <g>
    <rect x="60" y="163" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="95" cy="198" r="20" fill="#89b4fa"/>
    <text x="95" y="204" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">1</text>
    <text x="128" y="196" font-size="18" font-weight="700" fill="#cdd6f4">Research</text>
    <text x="128" y="219" font-size="12.5" fill="#cdd6f4" opacity="0.8">Systems Analyst — gather context</text>
    <text x="128" y="235" font-size="12.5" fill="#cdd6f4" opacity="0.8">and dependency notes</text>
  </g>

  <!-- Phase 2: Plan -->
  <g>
    <rect x="60" y="293" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="95" cy="328" r="20" fill="#89b4fa"/>
    <text x="95" y="334" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">2</text>
    <text x="128" y="326" font-size="18" font-weight="700" fill="#cdd6f4">Plan</text>
    <text x="128" y="349" font-size="12.5" fill="#cdd6f4" opacity="0.8">Lead Architect — master_plan.md</text>
    <text x="128" y="365" font-size="12.5" fill="#cdd6f4" opacity="0.8">architecture &amp; file tree</text>
  </g>

  <!-- Phase 3: Tasks -->
  <g>
    <rect x="60" y="423" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="95" cy="458" r="20" fill="#89b4fa"/>
    <text x="95" y="464" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">3</text>
    <text x="128" y="456" font-size="18" font-weight="700" fill="#cdd6f4">Tasks</text>
    <text x="128" y="479" font-size="12.5" fill="#cdd6f4" opacity="0.8">Scrum Master — break down</text>
    <text x="128" y="495" font-size="12.5" fill="#cdd6f4" opacity="0.8">task.md into checkable steps</text>
  </g>

  <!-- Phase 4: Code -->
  <g>
    <rect x="60" y="553" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="95" cy="588" r="20" fill="#89b4fa"/>
    <text x="95" y="594" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">4</text>
    <text x="128" y="586" font-size="18" font-weight="700" fill="#cdd6f4">Code</text>
    <text x="128" y="609" font-size="12.5" fill="#cdd6f4" opacity="0.8">Staff Engineer — implement</text>
    <text x="128" y="625" font-size="12.5" fill="#cdd6f4" opacity="0.8">source in outputs/</text>
  </g>

  <!-- Phase 5: Test -->
  <g>
    <rect x="60" y="683" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="95" cy="718" r="20" fill="#89b4fa"/>
    <text x="95" y="724" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">5</text>
    <text x="128" y="716" font-size="18" font-weight="700" fill="#cdd6f4">Test</text>
    <text x="128" y="739" font-size="12.5" fill="#cdd6f4" opacity="0.8">SDET — run &amp; validate suite,</text>
    <text x="128" y="755" font-size="12.5" fill="#cdd6f4" opacity="0.8">save test_results.txt</text>
  </g>

  <!-- Vertical flow arrows: worker column -->
  <line x1="200" y1="258" x2="200" y2="291" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="200" y1="388" x2="200" y2="421" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="200" y1="518" x2="200" y2="551" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <line x1="200" y1="648" x2="200" y2="681" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>

  <!-- ================= ADVISOR COLUMN ================= -->
  <!-- Phase 2.5: Plan Review -->
  <g>
    <rect x="860" y="293" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="895" cy="328" r="20" fill="#89b4fa"/>
    <text x="895" y="333" text-anchor="middle" font-size="14" font-weight="700" fill="#1e1e2e">2.5</text>
    <text x="928" y="326" font-size="18" font-weight="700" fill="#cdd6f4">Plan Review</text>
    <text x="928" y="349" font-size="12.5" fill="#cdd6f4" opacity="0.8">Principal Architect — audits</text>
    <text x="928" y="365" font-size="12.5" fill="#cdd6f4" opacity="0.8">master_plan.md (Mode 4 only)</text>
  </g>

  <!-- Dynamic Debug Support -->
  <g>
    <rect x="860" y="458" width="280" height="95" rx="16" fill="#313244" stroke="#f38ba8" stroke-width="2.5" stroke-dasharray="7,5" filter="url(#softShadow)"/>
    <circle cx="895" cy="493" r="20" fill="#f38ba8"/>
    <text x="895" y="499" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">⚡</text>
    <text x="928" y="491" font-size="18" font-weight="700" fill="#cdd6f4">Debug Escalate</text>
    <text x="928" y="514" font-size="12.5" fill="#cdd6f4" opacity="0.8">Dynamic, on-demand only —</text>
    <text x="928" y="530" font-size="12.5" fill="#cdd6f4" opacity="0.8">triggered when Test fails &gt; 2×</text>
  </g>

  <!-- Phase 6: Code Audit -->
  <g>
    <rect x="860" y="683" width="280" height="95" rx="16" fill="#313244" stroke="#89b4fa" stroke-width="2" filter="url(#softShadow)"/>
    <circle cx="895" cy="718" r="20" fill="#89b4fa"/>
    <text x="895" y="724" text-anchor="middle" font-size="16" font-weight="700" fill="#1e1e2e">6</text>
    <text x="928" y="716" font-size="18" font-weight="700" fill="#cdd6f4">Code Audit</text>
    <text x="928" y="739" font-size="12.5" fill="#cdd6f4" opacity="0.8">Security Auditor — reviews</text>
    <text x="928" y="755" font-size="12.5" fill="#cdd6f4" opacity="0.8">diff + test results</text>
  </g>

  <!-- ================= CROSS-COLUMN CONNECTIONS ================= -->

  <!-- Plan <-> Plan Review -->
  <line x1="340" y1="322" x2="858" y2="322" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="470" y="298" width="260" height="20" fill="#1e1e2e" opacity="0.9"/>
  <text x="600" y="313" text-anchor="middle" font-size="12.5" fill="#89b4fa" font-weight="600">Mode 4: submit plan for review</text>

  <line x1="858" y1="356" x2="340" y2="356" stroke="#89b4fa" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowBlue)"/>
  <rect x="480" y="362" width="240" height="18" fill="#1e1e2e" opacity="0.9"/>
  <text x="600" y="376" text-anchor="middle" font-size="12" fill="#cdd6f4" opacity="0.85">revised plan feedback</text>

  <!-- Test -> Code Audit -->
  <line x1="340" y1="705" x2="858" y2="705" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
  <rect x="460" y="681" width="280" height="20" fill="#1e1e2e" opacity="0.9"/>
  <text x="600" y="696" text-anchor="middle" font-size="12.5" fill="#89b4fa" font-weight="600">on pass: submit diff + results</text>

  <!-- Code Audit -> Code (rejection loop) -->
  <path d="M 860,745 C 680,815 480,790 340,635" fill="none" stroke="#f38ba8" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowRed)"/>
  <rect x="470" y="778" width="270" height="20" fill="#1e1e2e" opacity="0.9"/>
  <text x="605" y="793" text-anchor="middle" font-size="12.5" fill="#f38ba8" font-weight="600">REJECTED → fix &amp; retry (≤3×)</text>

  <!-- Test -> Debug Escalate (dynamic escalation) -->
  <path d="M 300,683 C 470,600 700,540 858,510" fill="none" stroke="#f38ba8" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrowRed)"/>
  <rect x="430" y="580" width="300" height="38" fill="#1e1e2e" opacity="0.92" rx="4"/>
  <text x="580" y="596" text-anchor="middle" font-size="13.5" fill="#f38ba8" font-weight="700">Debug Escalate (Max 3)</text>
  <text x="580" y="613" text-anchor="middle" font-size="11.5" fill="#cdd6f4" opacity="0.85">if tests fail &gt; 2 times</text>

  <!-- Debug Escalate -> Code (return fix) -->
  <path d="M 860,540 C 650,600 460,610 340,600" fill="none" stroke="#f38ba8" stroke-width="1.8" stroke-dasharray="4,4" marker-end="url(#arrowRed)"/>
  <rect x="440" y="628" width="180" height="18" fill="#1e1e2e" opacity="0.85"/>
  <text x="530" y="641" text-anchor="middle" font-size="11.5" fill="#cdd6f4" opacity="0.8">apply fix &amp; resume</text>

  <!-- ================= LEGEND ================= -->
  <g>
    <rect x="60" y="812" width="1080" height="52" rx="12" fill="#313244" stroke="#45475a" stroke-width="1.5"/>
    <line x1="90" y1="838" x2="140" y2="838" stroke="#89b4fa" stroke-width="2.5" marker-end="url(#arrowBlue)"/>
    <text x="152" y="843" font-size="13" fill="#cdd6f4">Standard workflow step</text>

    <line x1="380" y1="838" x2="430" y2="838" stroke="#89b4fa" stroke-width="2" stroke-dasharray="6,5" marker-end="url(#arrowBlue)"/>
    <text x="442" y="843" font-size="13" fill="#cdd6f4">Scheduled advisor call (budget mode)</text>

    <line x1="800" y1="838" x2="850" y2="838" stroke="#f38ba8" stroke-width="3" stroke-dasharray="8,5" marker-end="url(#arrowRed)"/>
    <text x="862" y="843" font-size="13" fill="#cdd6f4">Dynamic escalation / rejection loop</text>
  </g>
</svg>
